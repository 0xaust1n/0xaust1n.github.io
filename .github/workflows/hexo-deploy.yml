name: Build and Deploy Hexo Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Replace Google verification with secret
        run: |
          sed -i "s/google_site_verification:.*/google_site_verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}/" _config.butterfly.yml

      - name: Build Hexo Site
        run: |
          pnpm clean
          pnpm build

      - name: Get current date
        id: date
        run: echo "DEPLOY_DATE=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "feat: update blogs to v.${{ env.DEPLOY_DATE }}"
