name: Build and Deploy Hexo Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Replace Google verification with secret
        run: |
          sed -i "s/google_site_verification:.*/google_site_verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}/" _config.butterfly.yml

      - name: Build Hexo Site
        run: |
          yarn clean
          yarn build

      - name: Get current date
        id: date
        run: echo "DEPLOY_DATE=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "feat: update blogs to v.${{ env.DEPLOY_DATE }}"
